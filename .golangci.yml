version: "2"
run:
  build-tags:
    - cgo
linters:
  enable:
    - misspell
  disable:
    - depguard
    - exhaustive
    - wrapcheck
  settings:
    errcheck:
      check-type-assertions: true
      exclude-functions:
        - fmt.Fprintf
        - fmt.Printf
        - fmt.Println
        - (io.Closer).Close
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        path: _test\.go
      - linters:
          - staticcheck
        text: "ST1005:"
      - linters:
          - staticcheck
        text: "QF1003:|QF1001:|QF1002:|S1039:|S1016:|SA9003:"
      - linters:
          - ineffassign
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 50
  max-same-issues: 10
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/sgx-labs/statelessagent
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - internal/web/static\.go
